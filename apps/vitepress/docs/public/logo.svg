<svg width="500" height="400" viewBox="0 0 500 400" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#6366f1"/>
            <stop offset="100%" stop-color="#22c55e"/>
        </linearGradient>
    </defs>

    <!-- 背景圆 -->
    <circle cx="380" cy="80" r="60" fill="url(#bg)" opacity="0.2"/>
    <circle cx="100" cy="320" r="80" fill="#22c55e" opacity="0.15"/>

    <!-- 笔记本 -->
    <rect x="120" y="120" width="260" height="160" rx="12" fill="#1e293b"/>
    <rect x="130" y="130" width="240" height="120" rx="8" fill="#0f172a"/>

    <!-- 代码行 -->
    <rect x="150" y="150" width="120" height="8" rx="4" fill="#22c55e"/>
    <rect x="150" y="170" width="160" height="8" rx="4" fill="#6366f1"/>
    <rect x="150" y="190" width="100" height="8" rx="4" fill="#f59e0b"/>
    <rect x="150" y="210" width="140" height="8" rx="4" fill="#22c55e"/>

    <!-- 底座 -->
    <rect x="100" y="280" width="300" height="20" rx="10" fill="#334155"/>

    <!-- 左侧小元素 -->
    <circle cx="90" cy="140" r="6" fill="#22c55e"/>
    <circle cx="90" cy="170" r="6" fill="#6366f1"/>
    <circle cx="90" cy="200" r="6" fill="#f59e0b"/>

    <!-- 标题文字 -->
    <text x="250" y="350" text-anchor="middle" font-size="18" fill="#64748b">
        Coding · Docs · Growth
    </text>
</svg>